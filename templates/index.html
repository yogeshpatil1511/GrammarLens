<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GrammarLens | Smart Grammar & Spelling Checker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

  <header class="top-bar">
    <div class="logo">
      <span class="logo-icon">🔍</span>
      <span class="logo-text">GrammarLens</span>
    </div>
    <p class="tagline">Write with confidence — instantly fix grammar & spelling</p>
  </header>

  <main class="container">

    <section class="input-section">
      <label for="inputText" class="section-label">Your Text</label>
      <textarea id="inputText" placeholder="Type or paste your sentence, paragraph, or essay here..."></textarea>

      <div class="action-row">
        <span id="charCount" class="char-count">0 characters</span>
        <button id="checkBtn" onclick="checkText()">
          <span class="btn-icon">✓</span> Check My Text
        </button>
      </div>
    </section>

    <section id="results" class="results-section"></section>

  </main>

  <footer class="footer">
    <p>Built with Flask + LanguageTool — Free & Open Source</p>
  </footer>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
